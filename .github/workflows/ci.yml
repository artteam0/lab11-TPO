name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev, fix ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Проверить репозиторий (Checkout)
      uses: actions/checkout@v4

    - name: Настроить Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Установить зависимости
      run: |
        python -m pip install --upgrade pip
        # Ищем requirements.txt где бы он ни был и ставим
        find . -name "requirements.txt" -exec pip install -r {} \;

    - name: Запустить автотесты
      run: |
        # Находим точную папку с нашим test.py, переходим туда и жестко гасим кэш
        TARGET_DIR=$(find . -name "test.py" -exec dirname {} \; | head -n 1)
        cd "$TARGET_DIR"
        pytest test.py -o cache_dir=/dev/null

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Проверить репозиторий (Checkout)
      uses: actions/checkout@v4

    - name: Деплой на GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./